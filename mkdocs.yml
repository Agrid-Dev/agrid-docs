site_name: AGRID Documentation
site_url: https://docs.a-grid.com/
site_description: Official product documentation for AGRID smart thermostats
site_author: AGRID SAS

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - content.tabs.link
    - toc.integrate
  icon:
    alternate: material/web
  logo: assets/Logo_Agrid_White.png

plugins:
  - search
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: fr
          name: Français
          build: true
          nav_translations:
            Home: Accueil
            Fan Coil: Ventilo-convecteurs
            Overview: Vue d'ensemble
            Installation: Installation
            Wiring Diagrams: Schémas de câblage
            Usage: Utilisation
            Ecodesign: Écoconception

nav:
  - Home: index.md
  - Fan Coil:
    - AGR25-01:
      - Overview: fan-coil/agr25-01/index.md
      - Installation: fan-coil/agr25-01/installation.md
      - Wiring Diagrams: fan-coil/agr25-01/wiring.md
      - Usage: fan-coil/agr25-01/usage.md
      - Ecodesign: fan-coil/agr25-01/ecodesign.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      toc_depth: 2

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://a-grid.com
    - icon: fontawesome/solid/envelope
      link: mailto:contact@a-grid.com
  generator: false

copyright: "&copy; 2025 AGRID SAS — 33 rue du Faubourg Saint-Antoine, 75011 Paris, France"
